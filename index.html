.",audience:"[Target persona — e.g., Marketing Director at a 20-100 person SaaS company in the US]. They get 50+ cold emails a week and delete most in under 2 seconds.",refinement:"Give me 3 subject line options. Tone: warm, confident, direct — never salesy. Avoid the words: synergy, leverage, circle back, unlock, game-changer. End with my name only, no signature block."},es:{context:"Tengo un negocio de [tipo] que ayuda a [cliente ideal] a lograr [resultado]. Estoy contactando a un prospecto en frío que encontré en LinkedIn / por referido / por Google. Aún no me conoce.",role:"Eres un copywriter senior B2B especializado en email en frío con tasa de respuesta superior al 15%. Escribes como humano, nunca como vendedor.",specs:"Escribe un email en frío de 90 palabras con: (1) apertura personalizada mencionando la empresa o un logro reciente, (2) una frase sobre el problema que resuelvo, (3) un resultado específico de un cliente similar, (4) un CTA suave pidiendo una llamada de 15 min. Sin clichés. Sin 'espero que estés bien'. Frases cortas. Asunto de máximo 6 palabras.",audience:"[Persona objetivo — ej., Director de Marketing en una empresa SaaS de 20-100 personas en EE.UU.]. Recibe más de 50 emails en frío por semana y borra la mayoría en menos de 2 segundos.",refinement:"Dame 3 opciones de asunto. Tono: cálido, seguro, directo — nunca vendedor. Evita las palabras: sinergia, aprovechar, dar seguimiento, desbloquear. Termina solo con mi nombre, sin firma."}}},{id:"content-calendar",category:"Content",icon:"Calendar",title:{en:"30-Day Content Calendar",es:"Calendario de Contenido 30 Días"},description:{en:"Full-month posting plan with hooks and CTAs",es:"Plan mensual completo con ganchos y llamadas a la acción"},fields:{en:{context:"I'm a [your niche] consultant building authority on LinkedIn and Instagram. My main offer is [offer]. I post 4x/week and need a 30-day content calendar that drives DMs and discovery calls.",role:"You are a content strategist who has grown 7-figure consulting brands on LinkedIn. You think in pillars, hooks, and pattern interrupts — not 'engagement hacks.'",specs:"Produce a 30-day calendar in a table with these columns: Date, Pillar (Authority / Story / Tactical / Offer), Format (post / carousel / reel / story), Hook (first line, <12 words), Body (3 bullets max), CTA. 4 posts per week. Mix 40% Authority, 30% Story, 20% Tactical, 10% Offer.",audience:"[Your ideal client — e.g., Latina entrepreneurs running service businesses doing $5K-$30K/month who want to scale without burning out].",refinement:"Write hooks like a human, not an algorithm. No emojis at the start of hooks. No 'Here's a thread...' openers. Make each post stand alone — no series cliffhangers. Output as markdown table."},es:{context:"Soy consultor/a en [tu nicho] construyendo autoridad en LinkedIn e Instagram. Mi oferta principal es [oferta]. Publico 4 veces por semana y necesito un calendario de 30 días que genere DMs y llamadas de descubrimiento.",role:"Eres estratega de contenido que ha hecho crecer marcas consultoras de 7 cifras en LinkedIn. Piensas en pilares, ganchos y rompepatrones — no en 'hacks de engagement.'",specs:"Produce un calendario de 30 días en tabla con columnas: Fecha, Pilar (Autoridad / Historia / Táctico / Oferta), Formato (post / carrusel / reel / historia), Gancho (primera línea, <12 palabras), Cuerpo (máx. 3 bullets), CTA. 4 posts por semana. Mezcla: 40% Autoridad, 30% Historia, 20% Táctico, 10% Oferta.",audience:"[Tu cliente ideal — ej., emprendedoras Latinas con negocios de servicios facturando $5K-$30K/mes que quieren escalar sin quemarse].",refinement:"Escribe ganchos como humano, no como algoritmo. Sin emojis al inicio. Sin 'Aquí va un hilo...'. Cada post se sostiene solo — sin cliffhangers. Entrega como tabla markdown."}}},{id:"product-description",category:"Marketing",icon:"Tag",title:{en:"Product / Service Description",es:"Descripción de Producto/Servicio"},description:{en:"Conversion-focused copy for landing pages and offers",es:"Copy enfocado en conversión para landing pages y ofertas"},fields:{en:{context:"I sell [product/service] for [price]. The transformation it delivers is [before → after]. Current landing page converts at [X]% and I want to improve the offer section.",role:"You are a direct-response copywriter trained in StoryBrand and Eugene Schwartz's principles. You sell the transformation, not the deliverables.",specs:"Write a product description with this structure: (1) Headline that names the desired outcome, (2) Subheadline that names the obstacle removed, (3) 3 bullets of tangible deliverables, (4) 3 bullets of intangible outcomes (emotional/identity), (5) Risk reversal sentence, (6) CTA button text (3 versions). Keep total under 180 words.",audience:"[Awareness stage — e.g., Solution-aware: they know the problem and are comparing options. They've been burned by generic advice before.]",refinement:"Voice: confident, never hypey. No exclamation marks. No 'transform your business overnight.' Use specific numbers where possible. Read it out loud — if it sounds like an infomercial, rewrite it."},es:{context:"Vendo [producto/servicio] por [precio]. La transformación que entrega es [antes → después]. Mi landing actual convierte al [X]% y quiero mejorar la sección de oferta.",role:"Eres copywriter de respuesta directa entrenado/a en StoryBrand y los principios de Eugene Schwartz. Vendes la transformación, no los entregables.",specs:"Escribe una descripción con esta estructura: (1) Titular que nombre el resultado deseado, (2) Subtítulo que nombre el obstáculo removido, (3) 3 bullets de entregables tangibles, (4) 3 bullets de resultados intangibles (emocional/identidad), (5) Frase de reversión de riesgo, (6) Texto del botón CTA (3 versiones). Total bajo 180 palabras.",audience:"[Etapa de conciencia — ej., Consciente de la solución: conocen el problema y comparan opciones. Han sido decepcionados/as por consejos genéricos antes.]",refinement:"Voz: segura, nunca con bombo. Sin signos de exclamación. Sin 'transforma tu negocio de la noche a la mañana.' Usa números específicos cuando sea posible. Léelo en voz alta — si suena a infomercial, reescríbelo."}}},{id:"sales-script",category:"Sales",icon:"Phone",title:{en:"Discovery Call Script",es:"Guion de Llamada de Descubrimiento"},description:{en:"Question framework to qualify and close in one call",es:"Marco de preguntas para calificar y cerrar en una llamada"},fields:{en:{context:"I run 30-minute discovery calls with prospects who booked from a lead magnet or referral. My average close rate is [X]% and I want to raise it. My offer is [offer + price].",role:"You are a sales coach trained in SPIN selling and Sandler's reversal techniques. You teach consultants to lead with questions, not pitches.",specs:"Build a discovery call script with 5 sections: (1) Opener — 2 minutes of rapport + frame setting, (2) Situation questions — 4 questions about their current state, (3) Problem questions — 4 questions surfacing pain, (4) Implication questions — 3 questions amplifying cost of inaction, (5) Offer transition — exact words to bridge from diagnosis to my solution. Include timing for each section.",audience:"Prospects who are [problem-aware / solution-aware]. They've usually tried [common alternatives] and are skeptical.",refinement:"Tone: curious, not pushy. Never use 'pain points' or 'unpack.' Every question should make them think, not just respond yes/no. Include 2 example reversal responses for common objections."},es:{context:"Hago llamadas de descubrimiento de 30 min con prospectos que vienen de un imán de leads o referido. Mi tasa de cierre actual es [X]% y quiero subirla. Mi oferta es [oferta + precio].",role:"Eres coach de ventas entrenado/a en SPIN selling y las técnicas de reversión de Sandler. Enseñas a consultores a liderar con preguntas, no con pitches.",specs:"Crea un guion de llamada con 5 secciones: (1) Apertura — 2 minutos de rapport + marco, (2) Preguntas de situación — 4 sobre su estado actual, (3) Preguntas de problema — 4 que revelen el dolor, (4) Preguntas de implicación — 3 que amplifiquen el costo de no actuar, (5) Transición a la oferta — palabras exactas para pasar del diagnóstico a mi solución. Incluye tiempo por sección.",audience:"Prospectos [conscientes del problema / conscientes de la solución]. Usualmente han probado [alternativas comunes] y son escépticos.",refinement:"Tono: curioso, no agresivo. Nunca uses 'puntos de dolor' ni 'desempacar'. Cada pregunta debe hacerlos pensar, no solo responder sí/no. Incluye 2 ejemplos de respuestas de reversión para objeciones comunes."}}},{id:"social-post",category:"Marketing",icon:"MessageSquare",title:{en:"LinkedIn Post (Hook + Story)",es:"Post de LinkedIn (Gancho + Historia)"},description:{en:"High-engagement post with hook, story, and CTA",es:"Post de alta interacción con gancho, historia y CTA"},fields:{en:{context:"I'm building thought leadership on LinkedIn for [your niche]. I want to share [lesson / story / contrarian take] in a post that drives saves, comments, and profile visits — not vanity likes.",role:"You are a LinkedIn ghostwriter for top consultants. You write posts that get 100+ comments by being specific, honest, and useful — not by chasing trends.",specs:"Write a LinkedIn post under 1300 characters with: (1) A hook in the first 2 lines that creates curiosity or pattern interrupt, (2) A short personal story or case (specific numbers and details), (3) The lesson distilled into 3-5 short lines, (4) A question CTA. Use line breaks generously — never write more than 2 sentences in a row.",audience:"[Your follower base — e.g., Service-based entrepreneurs, mostly women, mostly bootstrapped, 1-5 years in business].",refinement:"No emojis. No '👇 here's what I learned.' No 'I used to think X, but now I know Y' if it's not literally true. Voice should be: clear, slightly understated, with one moment of vulnerability or humor. End with a question that invites a real answer, not just 'agree?'"},es:{context:"Estoy construyendo liderazgo de pensamiento en LinkedIn en [tu nicho]. Quiero compartir [lección / historia / opinión contraria] en un post que genere guardados, comentarios y visitas al perfil — no likes vanidosos.",role:"Eres ghostwriter de LinkedIn para consultores top. Escribes posts con 100+ comentarios siendo específico/a, honesto/a y útil — no persiguiendo tendencias.",specs:"Escribe un post de LinkedIn bajo 1300 caracteres con: (1) Un gancho en las primeras 2 líneas que cree curiosidad o rompa patrón, (2) Una historia o caso corto (números y detalles específicos), (3) La lección destilada en 3-5 líneas cortas, (4) Un CTA en pregunta. Usa saltos de línea generosos — nunca más de 2 oraciones seguidas.",audience:"[Tu base de seguidores — ej., emprendedores de servicios, mayoría mujeres, autofinanciados, 1-5 años en el negocio].",refinement:"Sin emojis. Sin '👇 aquí lo que aprendí.' Sin 'antes pensaba X, ahora sé Y' si no es literalmente cierto. Voz: clara, con cierta humildad, con un momento de vulnerabilidad o humor. Termina con una pregunta que invite respuesta real, no solo '¿de acuerdo?'"}}},{id:"sop",category:"Operations",icon:"ClipboardList",title:{en:"Standard Operating Procedure",es:"Procedimiento Operativo Estándar (SOP)"},description:{en:"Document a repeatable process for your team or VA",es:"Documenta un proceso repetible para tu equipo o asistente virtual"},fields:{en:{context:"I'm documenting a repeatable process in my business so I can delegate it to a VA / team member. The process is [name of process]. Currently I do it myself and it takes [X] minutes/hours.",role:"You are an operations consultant who has built SOPs for 100+ small businesses. You write for the person doing the task — not for an audit.",specs:"Create a SOP with: (1) Purpose (one sentence — what success looks like), (2) When to use this SOP (trigger), (3) Tools/access required, (4) Step-by-step instructions with exact clicks, links, and decision po de lo esperado, revisa esto antes de refinar."}),y.jsx("ul",{className:"space-y-2",children:o.diagnostic.map((i,l)=>y.jsxs("li",{className:"text-sm flex items-start gap-2",children:[y.jsx("span",{className:"text-primary font-bold",children:"→"}),y.jsx("span",{children:i})]},l))})]})]})}const U1={title:"The C.R.E.A.R. operational manual",intro:"Five components. Each removes a specific failure mode in how AI interprets your request. Master them and you stop fighting your prompts.",sections:[{letter:"C",heading:"Context — What's the situation?",body:"Context is the world the AI walks into. Without it, the model picks the most generic interpretation of your request — which is why most outputs feel hollow. Strong context names the business, the current state, and the trigger.",rules:["Name the business type, what you sell, and to whom.","Describe the current state with one number when possible (revenue, conversion rate, team size).","Say what already happened — what you tried, what didn't work, what changed.","Mention real constraints: budget, deadline, tools available."]},{letter:"R",heading:"Role — Who should the AI become?",body:"AI defaults to a 'helpful assistant.' That voice is bland by design. Assigning a specific expert role unlocks domain-specific patterns the model knows but won't volunteer.",rules:["Be specific: 'Senior B2B copywriter who specializes in cold email' beats 'marketing expert.'","Add a credibility marker: years of experience, a measurable result, a school of thought.","Name what the role does NOT do — 'writes like a human, never like a marketer.'","Avoid stacking 3 roles into one prompt. Pick the dominant lens."]},{letter:"E",heading:"Specifications (Especificaciones) — What exactly do you need?",body:"This is where most prompts collapse. 'Write a sales email' produces a sales email. 'Write a 90-word cold email with these 4 sections, under these exclusions' produces something usable. Specifications kill ambiguity.",rules:["State the format — table, numbered list, paragraphs, sections.","Add a numeric limit — word count, character count, number of bullets.","Structure the output: (1) opener, (2) middle, (3) close.","List what NOT to include. Exclusions are as powerful as inclusions."]},{letter:"A",heading:"Audience — Who is the reader?",body:"The reader changes everything: vocabulary, examples, length, what you assume they already know. AI cannot guess this. Tell it.",rules:["Name the role, company size, and decision stage.","Add what they've already seen or tried — sophistication shapes the message.","Note their reading context: mobile, in a meeting, scanning fast.","If writing for a niche, name an example reader you know personally."]},{letter:"R",heading:"Refinement — How should it sound?",body:"The final pass is where you fight AI slop. Tone, voice, banned words, and variant requests transform a mediocre draft into something you'd publish.",rules:["Give 3 tone adjectives or compare to a known style ('like a Morning Brew newsletter').","Ban specific words: synergy, leverage, unlock, circle back, dive in, transform overnight.","Ask for 2-3 variants of headlines, CTAs, or subject lines.","Add a self-check: 'Read it out loud — if it sounds like an infomercial, rewrite.'"]}],workflow:[{title:"Draft 1 — Run the full C.R.E.A.R. prompt",desc:"Use the builder. Get a baseline output. Don't edit the prompt yet — just read the result critically."},{title:"Refinement 1 — Fix structure",desc:"Reply: 'Keep the voice but restructure as [format]. Tighten section 2.' Structural fixes are the highest leverage."},{title:"Refinement 2 — Fix voice and specifics",desc:"Reply: 'Same content, but more specific in section 3. Remove [banned words]. Make the opener 30% shorter.'"},{title:"Refinement 3 — Polish and variants",desc:"Reply: 'Give me 3 alternate openers and 2 stronger CTAs. Pick the best variant — final asset ready to ship.'"}],diagnostic:["Output is generic? → Role is too broad or Audience is missing.","Output is too long? → Specifications missing a word/character limit.","Output sounds salesy or hypey? → Refinement missing banned-word list.","Output ignores my situation? → Context missing the current state or trigger.","Output is well-written but wrong format? → Specifications missing structure.","Output keeps repeating itself? → You're chaining edits instead of restarting with a stronger prompt."]},B1={title:"El manual operativo C.R.E.A.R.",intro:"Cinco componentes. Cada uno elimina un modo específico de falla en cómo la IA interpreta tu solicitud. Domínalos y dejas de pelear con tus prompts.",sections:[{letter:"C",heading:"Contexto — ¿Cuál es la situación?",body:"El contexto es el mundo en el que entra la IA. Sin él, el modelo toma la interpretación más genérica — por eso la mayoría de las salidas se sienten vacías. Un buen contexto nombra el negocio, el estado actual y el disparador.",rules:["Nombra el tipo de negocio, qué vendes y a quién.","Describe el estado actual con un número cuando sea posible (ingresos, conversión, tamaño del equipo).","Di qué ya pasó — qué intentaste, qué no funcionó, qué cambió.","Menciona limitaciones reales: presupuesto, plazo, herramientas disponibles."]},{letter:"R",heading:"Rol — ¿En quién debe convertirse la IA?",body:"Por defecto la IA es un 'asistente útil.' Esa voz es plana por diseño. Asignar un rol experto específico desbloquea patrones de dominio que el modelo conoce pero no ofrece solo.",rules:["Sé específico: 'Copywriter B2B senior especializado en email en frío' supera a 'experto en marketing.'","Agrega marca de credibilidad: años de experiencia, resultado medible, escuela de pensamiento.","Nombra qué NO hace el rol — 'escribe como humano, nunca como vendedor.'","Evita apilar 3 roles en un prompt. Elige el lente dominante."]},{letter:"E",heading:"Especificaciones — ¿Qué necesitas exactamente?",body:"Aquí es donde colapsan la mayoría de los prompts. 'Escribe un email de ventas' produce un email de ventas. 'Escribe un email en frío de 90 palabras con estas 4 secciones, bajo estas exclusiones' produce algo usable. Las especificaciones matan la ambigüedad.",rules:["Define el formato — tabla, lista numerada, párrafos, secciones.","Agrega un límite numérico — palabras, caracteres, número de bullets.","Estructura la salida: (1) apertura, (2) medio, (3) cierre.","Lista qué NO incluir. Las exclusiones son tan potentes como las inclusiones."]},{letter:"A",heading:"Audiencia — ¿Quién es el lector?",body:"El lector cambia todo: vocabulario, ejemplos, longitud, qué asumes que ya sabe. La IA no puede adivinarlo. Dile.",rules:["Nombra el rol, tamaño de empresa y etapa de decisión.","Agrega qué ya ha visto o intentado — la sofisticación da forma al mensaje.","Anota el contexto de lectura: móvil, en una reunión, escaneando rápido.","Si escribes para un nicho, nombra un lector ejemplo que conozcas personalmente."]},{letter:"R",heading:"Refinamiento — ¿Cómo debe sonar?",body:"La pasada final es donde peleas contra el AI slop. Tono, voz, palabras prohibidas y variantes transforman un borrador mediocre en algo publicable.",rules:["Da 3 adjetivos de tono o compara con un estilo conocido ('como newsletter de Morning Brew').","Prohíbe palabras específicas: sinergia, aprovechar, desbloquear, dar seguimiento, transformar de la noche a la mañana.","Pide 2-3 variantes de titulares, CTAs o líneas de asunto.","Agrega autocrítica: 'Léelo en voz alta — si suena a infomercial, reescríbelo.'"]}],workflow:[{title:"Borrador 1 — Ejecuta el prompt C.R.E.A.R. completo",desc:"Usa el constructor. Obtén una salida base. No edites el prompt todavía — solo lee el resultado críticamente."},{title:"Refinamiento 1 — Arregla la estructura",desc:"Responde: 'Mantén la voz pero reestructura como [formato]. Aprieta la sección 2.' Los arreglos estructurales son la mayor palanca."},{title:"Refinamiento 2 — Arregla voz y especificidad",desc:"Responde: 'Mismo contenido, pero más específico en la sección 3. Quita [palabras prohibidas]. Acorta la apertura 30%.'"},{title:"Refinamiento 3 — Pule y pide variantes",desc:"Responde: 'Dame 3 aperturas alternativas y 2 CTAs más fuertes. Elige la mejor variante — activo final listo para enviar.'"}],diagnostic:["¿Salida genérica? → El Rol es demasiado amplio o falta la Audiencia.","¿Salida muy larga? → Faltan límites de palabra/carácter en Especificaciones.","¿Suena a venta o con bombo? → Falta lista de palabras prohibidas en Refinamiento.","¿Ignora mi situación? → Falta el estado actual o disparador en Contexto.","¿Bien escrita pero formato incorrecto? → Falta estructura en Especificaciones.","¿Se repite? → Estás encadenando ediciones en vez de reiniciar con un prompt más fuerte."]};function q1(){return y.jsxs(Ey,{children:[y.jsx(uf,{path:"/",component:L1}),y.jsx(uf,{component:r1})]})}function V1(){return y.jsx(nv,{client:iv,children:y.jsxs(Xx,{children:[y.jsx(h0,{}),y.jsx(Jf,{hook:tp,children:y.jsx(q1,{})})]})})}window.location.hash||(window.location.hash="#/");ny.createRoot(document.getElementById("root")).render(y.jsx(V1,{}));
